<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout com Pagamento - ABT Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body{ font-family:'Poppins',sans-serif; background:#f4f4f4; margin:0; padding:0; color:#333; }
        header{ background:#1c1c1c; color:#d4af37; padding:15px 20px; display:flex; justify-content:space-between; align-items:center; }
        header h1{ font-size:1.5rem; }
        header nav a{ color:#d4af37; margin-left:15px; text-decoration:none; font-weight:bold; }
        .container{ max-width:1000px; margin:40px auto; background:white; padding:30px; border-radius:10px; box-shadow:0 5px 20px rgba(0,0,0,0.1); }
        h2{text-align:center; margin-bottom:20px;}
        .carrinho-item{ display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #ccc; }
        .carrinho-item img{ width:60px; height:60px; object-fit:cover; border-radius:5px; margin-right:15px; }
        .carrinho-item-details{ flex:1; }
        .quantidade{ display:flex; align-items:center; gap:5px; }
        .quantidade button{ padding:5px 10px; background:#d4af37; border:none; border-radius:5px; cursor:pointer; font-weight:bold; }
        .quantidade input{ width:40px; text-align:center; border-radius:5px; border:1px solid #ccc; padding:5px; }
        .total{ text-align:right; font-size:1.2rem; font-weight:bold; margin-top:20px; }
        form input, form textarea{ width:100%; padding:12px; margin:10px 0; border-radius:5px; border:1px solid #ccc; font-size:1rem; box-sizing: border-box; }
        form button{ width:100%; padding:15px; background:#d4af37; border:none; font-weight:bold; border-radius:5px; cursor:pointer; transition:0.3s; margin-bottom:10px; }
        form button:hover{ background:#b88b2f; color:white; }
        #confirmacao{ background:#d4af37; padding:15px; border-radius:5px; color:#1c1c1c; text-align:center; margin:20px 0; display:none; }
        footer{ background:#1c1c1c; color:#d4af37; text-align:center; padding:20px; margin-top:40px; }
        .pagamento-opcoes{ display:flex; flex-direction:column; gap:10px; margin:20px 0; }
    </style>
</head>
<body>

<header>
    <h1>ABT Marketplace</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="loja.html">Loja</a>
        <a href="carrinho.html">Carrinho 🛒</a>
    </nav>
</header>

<div class="container">
    <h2>Checkout com Pagamento</h2>

    <div id="carrinho-itens"></div>
    <p class="total" id="subtotal-total"></p>

    <div id="confirmacao">Pedido enviado com sucesso para a nuvem!</div>

    <h2>Informações do Cliente</h2>
    <form id="checkout-form">
        <input type="text" id="nome-cliente" placeholder="Nome Completo" required>
        <input type="email" id="email-cliente" placeholder="Seu E-mail" required>
        <input type="text" id="telefone-cliente" placeholder="Telefone (Ex: +244 9xxxxxxx)" required>
        <textarea id="endereco-cliente" placeholder="Endereço completo" rows="3" required></textarea>

        <div class="pagamento-opcoes">
            <label><input type="radio" name="pagamento" value="cartao" required> Cartão de Crédito/Débito</label>
            <label><input type="radio" name="pagamento" value="transferencia"> Transferência / MBWay</label>
            <label><input type="radio" name="pagamento" value="whatsapp" checked> Pagar via WhatsApp (Recomendado)</label>
        </div>

        <button type="submit" id="btn-finalizar">Finalizar Pedido na Nuvem</button>
    </form>
</div>

<footer>
    <p>© 2026 ABT Marketplace - Todos os direitos reservados</p>
</footer>

<script>
function mostrarCarrinho(){
    let carrinho=JSON.parse(localStorage.getItem('carrinho'))||[];
    let container=document.getElementById('carrinho-itens');
    let total=0;
    container.innerHTML='';
    if(carrinho.length===0){
        container.innerHTML='<p>Seu carrinho está vazio!</p>';
    } else {
        carrinho.forEach((item,index)=>{
            if(!item.quantidade)item.quantidade=1;
            let subtotalItem=item.preco*item.quantidade;
            total+=subtotalItem;
            container.innerHTML+=`
                <div class="carrinho-item">
                    <img src="${item.imagem}" alt="${item.nome}">
                    <div class="carrinho-item-details">
                        <h4>${item.nome}</h4>
                        <p>Preço: ${item.preco} Kz</p>
                        <div class="quantidade">
                            <button onclick="alterarQuantidade(${index}, -1)">-</button>
                            <input type="number" value="${item.quantidade}" min="1" onchange="atualizarQuantidade(${index}, this.value)">
                            <button onclick="alterarQuantidade(${index}, 1)">+</button>
                            <span>Subtotal: ${subtotalItem} Kz</span>
                        </div>
                    </div>
                </div>`;
        });
    }
    document.getElementById('subtotal-total').innerText='Total: '+total+' Kz';
}

function alterarQuantidade(index, delta){
    let carrinho=JSON.parse(localStorage.getItem('carrinho'))||[];
    carrinho[index].quantidade=Math.max(1,(carrinho[index].quantidade||1)+delta);
    localStorage.setItem('carrinho',JSON.stringify(carrinho));
    mostrarCarrinho();
}

function atualizarQuantidade(index, valor){
    let carrinho=JSON.parse(localStorage.getItem('carrinho'))||[];
    carrinho[index].quantidade=Math.max(1,parseInt(valor)||1);
    localStorage.setItem('carrinho',JSON.stringify(carrinho));
    mostrarCarrinho();
}

mostrarCarrinho();
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDWTvMQNPc27WJpQfKr1zwdvaw1LDMUxH0",
        authDomain: "abt-marketplace.firebaseapp.com",
        projectId: "abt-marketplace",
        storageBucket: "abt-marketplace.firebasestorage.app",
        messagingSenderId: "763460800092",
        appId: "1:763460800092:web:5ac1f341919c1fa02ea099"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('checkout-form').addEventListener('submit', async function(e){
        e.preventDefault();
        
        let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
        if(carrinho.length === 0){ alert("Carrinho vazio!"); return; }

        const btn = document.getElementById('btn-finalizar');
        btn.innerText = "Processando...";
        btn.disabled = true;

        let total = carrinho.reduce((sum,item) => sum + item.preco * item.quantidade, 0);
        let pagamento = document.querySelector('input[name="pagamento"]:checked').value;

        // Objeto formatado para o seu Admin do Firebase
        let pedido = {
            cliente: document.getElementById('nome-cliente').value,
            email: document.getElementById('email-cliente').value,
            telefone: document.getElementById('telefone-cliente').value,
            endereco: document.getElementById('endereco-cliente').value,
            total: total + " Kz",
            itens: carrinho,
            pagamento: pagamento,
            status: "Pendente",
            data: new Date().toISOString()
        };

        try {
            // ENVIA PARA O FIREBASE
            await addDoc(collection(db, "pedidos"), pedido);

            // ABRIR WHATSAPP
            let mensagem = `*Novo Pedido ABT*\nCliente: ${pedido.cliente}\nTotal: ${pedido.total}\nPagamento: ${pagamento}`;
            window.open("https://wa.me/+244937912339?text="+encodeURIComponent(mensagem),'_blank');

            // LIMPEZA E SUCESSO
            localStorage.removeItem('carrinho');
            document.getElementById('confirmacao').style.display='block';
            alert("Pedido enviado com sucesso!");
            window.location.href = "index.html";

        } catch (error) {
            console.error(error);
            alert("Erro ao conectar com o servidor. Tente novamente.");
            btn.disabled = false;
            btn.innerText = "Finalizar Pedido";
        }
    });
</script>

</body>
</html>
