<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | ABT Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .checkout-container { max-width: 600px; margin: 50px auto; padding: 30px; background: #fff; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .resumo-pedido { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 25px; border-left: 4px solid #d4af37; }
        .campo { margin-bottom: 15px; }
        .campo label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        .campo input, .campo select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .total-pagar { font-size: 1.5rem; text-align: center; margin: 20px 0; color: #1c1c1c; }
        .btn-confirmar { width: 100%; padding: 18px; background: #25D366; color: white; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-confirmar:hover { background: #128C7E; transform: scale(1.02); }
    </style>
</head>
<body>

<header>
    <nav style="background: #1c1c1c; padding: 15px; text-align: center;">
        <h1 style="color: #d4af37; margin: 0;">Finalizar Compra</h1>
    </nav>
</header>

<main class="checkout-container">
    <div class="resumo-pedido">
        <h3>Resumo do Pedido</h3>
        <div id="itens-resumo"></div>
        <div class="total-pagar">Total: <strong id="total-checkout">0</strong> Kz</div>
    </div>

    <div class="form-checkout">
        <div class="campo">
            <label>Nome Completo</label>
            <input type="text" id="nome" placeholder="Como devemos chamar-te?">
        </div>
        <div class="campo">
            <label>Teu WhatsApp</label>
            <input type="tel" id="whatsapp" placeholder="Ex: 923 000 000">
        </div>
        <div class="campo">
            <label>Endereço de Entrega (Luanda)</label>
            <input type="text" id="endereco" placeholder="Bairro, Rua, Casa nº">
        </div>
        <div class="campo">
            <label>Método de Pagamento</label>
            <select id="pagamento">
                <option value="Transferência">Transferência (IBAN)</option>
                <option value="TPA">TPA no Local</option>
                <option value="Dinheiro">Dinheiro vivo</option>
            </select>
        </div>

        <button class="btn-confirmar" id="btnFinalizarTudo">Confirmar e Enviar Pedido 🚀</button>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDWTvMQNPc27WJpQfKr1zwdvaw1LDMUxH0",
        authDomain: "abt-marketplace.firebaseapp.com",
        projectId: "abt-marketplace",
        storageBucket: "abt-marketplace.firebasestorage.app",
        messagingSenderId: "763460800092",
        appId: "1:763460800092:web:5ac1f341919c1fa02ea099"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Carregar dados do carrinho para o resumo
    let carrinho = JSON.parse(localStorage.getItem("carrinhoABT")) || [];
    const resumoDiv = document.getElementById("itens-resumo");
    const totalDiv = document.getElementById("total-checkout");
    let totalGeral = 0;

    if(carrinho.length === 0) window.location.href = "loja.html";

    carrinho.forEach(item => {
        totalGeral += (item.preco * item.quantidade);
        resumoDiv.innerHTML += `<p>• ${item.nome} (x${item.quantidade})</p>`;
    });
    totalDiv.innerText = totalGeral;

    // AÇÃO DE FINALIZAR
    document.getElementById("btnFinalizarTudo").addEventListener("click", async () => {
        const nome = document.getElementById("nome").value;
        const tel = document.getElementById("whatsapp").value;
        const endereco = document.getElementById("endereco").value;
        const metodo = document.getElementById("pagamento").value;

        if(!nome || !tel || !endereco) return alert("Por favor, preencha todos os campos!");

        try {
            // 1. Gravar na Nuvem (Firebase)
            await addDoc(collection(db, "pedidos"), {
                cliente: nome,
                telefone: tel,
                endereco: endereco,
                metodoPagamento: metodo,
                total: totalGeral,
                itens: carrinho,
                status: "Pendente",
                data: new Date().toLocaleString()
            });

            // 2. Criar mensagem WhatsApp
            let msg = `*NOVO PEDIDO - ABT MARKETPLACE*%0A%0A`;
            msg += `👤 *Cliente:* ${nome}%0A`;
            msg += `📞 *Tel:* ${tel}%0A`;
            msg += `📍 *Entrega:* ${endereco}%0A`;
            msg += `💳 *Pagamento:* ${metodo}%0A%0A`;
            msg += `📦 *Produtos:*%0A`;
            carrinho.forEach(i => msg += `- ${i.nome} (x${i.quantidade})%0A`);
            msg += `%0A💰 *TOTAL: ${totalGeral} Kz*`;

            const linkZap = `https://wa.me/244937912339?text=${msg}`;

            // Limpar e fechar
            localStorage.removeItem("carrinhoABT");
            window.location.href = linkZap;

        } catch (e) {
            alert("Erro ao enviar pedido: " + e.message);
        }
    });
</script>

</body>
</html>
