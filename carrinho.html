<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Carrinho | ABT Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .carrinho-container { max-width: 800px; margin: 30px auto; padding: 20px; background: #fff; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .item-carrinho { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 15px 0; }
        .item-carrinho img { width: 60px; height: 60px; object-fit: cover; border-radius: 5px; }
        .detalhes-item { flex: 1; margin-left: 15px; }
        .btn-remover { color: red; cursor: pointer; border: none; background: none; font-size: 0.8rem; font-weight: bold; }
        .total-box { text-align: right; margin-top: 20px; font-size: 1.4rem; font-weight: bold; color: #1c1c1c; border-top: 2px solid #d4af37; padding-top: 10px; }
        .formulario-envio { margin-top: 30px; background: #f9f9f9; padding: 20px; border-radius: 8px; }
        .formulario-envio input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-finalizar { width: 100%; padding: 15px; background: #25D366; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-finalizar:hover { background: #128C7E; }
    </style>
</head>
<body>

<header>
    <nav style="background: #1c1c1c; padding: 15px; display: flex; justify-content: space-between; align-items: center;">
        <h1 style="color: #d4af37; margin: 0; font-size: 1.2rem;">ABT Carrinho</h1>
        <a href="loja.html" style="color: white; text-decoration: none; font-weight: bold;">🛒 Voltar à Loja</a>
    </nav>
</header>

<main class="carrinho-container">
    <h2>Seu Carrinho</h2>
    <div id="lista-carrinho">
        <p style="text-align:center;">O seu carrinho está vazio...</p>
    </div>

    <div class="total-box">
        Total: <span id="valor-total">0</span> Kz
    </div>

    <div class="formulario-envio">
        <h3>Dados de Entrega</h3>
        <input type="text" id="nome-cliente" placeholder="Teu Nome Completo">
        <input type="tel" id="tel-cliente" placeholder="Teu WhatsApp (Ex: 923...)">
        <button class="btn-finalizar" id="btnFinalizar">Finalizar e Enviar Pedido 🚀</button>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDWTvMQNPc27WJpQfKr1zwdvaw1LDMUxH0",
        authDomain: "abt-marketplace.firebaseapp.com",
        projectId: "abt-marketplace",
        storageBucket: "abt-marketplace.firebasestorage.app",
        messagingSenderId: "763460800092",
        appId: "1:763460800092:web:5ac1f341919c1fa02ea099"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Carregar itens do carrinho
    let carrinho = JSON.parse(localStorage.getItem("carrinhoABT")) || [];

    function renderizarCarrinho() {
        const container = document.getElementById("lista-carrinho");
        const totalExibicao = document.getElementById("valor-total");
        container.innerHTML = "";
        let totalGeral = 0;

        if (carrinho.length === 0) {
            container.innerHTML = "<p style='text-align:center;'>O carrinho está vazio.</p>";
            totalExibicao.innerText = "0";
            return;
        }

        carrinho.forEach((item, index) => {
            const subtotal = item.preco * item.quantidade;
            totalGeral += subtotal;

            container.innerHTML += `
                <div class="item-carrinho">
                    <img src="${item.imagem}" alt="${item.nome}">
                    <div class="detalhes-item">
                        <strong>${item.nome}</strong><br>
                        <small>${item.preco} Kz x ${item.quantidade}</small>
                    </div>
                    <div style="text-align:right;">
                        <strong>${subtotal} Kz</strong><br>
                        <button class="btn-remover" onclick="window.removerItem(${index})">Remover</button>
                    </div>
                </div>`;
        });

        totalExibicao.innerText = totalGeral;
    }

    // Função Global para remover itens
    window.removerItem = (index) => {
        carrinho.splice(index, 1);
        localStorage.setItem("carrinhoABT", JSON.stringify(carrinho));
        renderizarCarrinho();
    };

    // Função para Finalizar o Pedido
    document.getElementById("btnFinalizar").addEventListener("click", async () => {
        const nome = document.getElementById("nome-cliente").value;
        const tel = document.getElementById("tel-cliente").value;
        const total = document.getElementById("valor-total").innerText;

        if (!nome || !tel || carrinho.length === 0) {
            alert("Por favor, preencha os seus dados e adicione itens!");
            return;
        }

        try {
            // 1. Enviar para o Firebase
            await addDoc(collection(db, "pedidos"), {
                cliente: nome,
                telefone: tel,
                total: total,
                itens: carrinho,
                status: "Pendente",
                data: new Date().toLocaleString()
            });

            // 2. Criar mensagem para WhatsApp
            let msg = `*Novo Pedido - ABT Marketplace*%0A`;
            msg += `*Cliente:* ${nome}%0A`;
            msg += `*WhatsApp:* ${tel}%0A%0A`;
            msg += `*Produtos:*%0A`;
            carrinho.forEach(i => {
                msg += `• ${i.nome} (x${i.quantidade})%0A`;
            });
            msg += `%0A*Total: ${total} Kz*`;

            const meuNumero = "244937912339"; 
            const linkZap = `https://wa.me/${meuNumero}?text=${msg}`;

            // 3. Limpar e redirecionar
            localStorage.removeItem("carrinhoABT");
            window.location.href = linkZap;

        } catch (e) {
            console.error("Erro:", e);
            alert("Erro ao processar o pedido.");
        }
    });

    renderizarCarrinho();
</script>

</body>
</html>
