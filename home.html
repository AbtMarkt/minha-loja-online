<script type="module">
// --- IMPORTAÇÃO DO FIREBASE ---
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, getDocs, limit, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDWTvMQNPc27WJpQfKr1zwdvaw1LDMUxH0",
    authDomain: "abt-marketplace.firebaseapp.com",
    projectId: "abt-marketplace",
    storageBucket: "abt-marketplace.firebasestorage.app",
    messagingSenderId: "763460800092",
    appId: "1:763460800092:web:5ac1f341919c1fa02ea099"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// --- MINI CARRINHO (Sincronizado) ---
window.atualizarMiniCarrinho = function() {
    let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
    let totalItens = carrinho.length;
    let subtotal = carrinho.reduce((acc, item) => acc + (item.preco || 0), 0);
    document.getElementById('itens-count').innerText = totalItens;
    document.getElementById('subtotal').innerText = subtotal + ' Kz';
}

// --- ADICIONAR AO CARRINHO ---
window.adicionarCarrinho = function(nome, preco, imagem) {
    let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
    carrinho.push({ nome, preco, imagem, quantidade: 1 });
    localStorage.setItem('carrinho', JSON.stringify(carrinho));
    alert(nome + " foi adicionado!");
    window.atualizarMiniCarrinho();
}

// --- CARREGAR PRODUTOS DA NUVEM (FIREBASE) ---
async function carregarDestacadosFirebase() {
    const container = document.getElementById('destacados-container');
    container.innerHTML = '<p>A carregar novidades...</p>';

    try {
        // Busca os últimos 6 produtos adicionados na coleção "produtos"
        const q = query(collection(db, "produtos"), limit(6));
        const querySnapshot = await getDocs(q);
        
        container.innerHTML = ''; // Limpa o carregando

        querySnapshot.forEach((doc) => {
            const prod = doc.data();
            const prodDiv = document.createElement('div');
            prodDiv.className = 'produto';

            // Tratamento de imagem (caso seja array ou string única)
            const imgPrincipal = Array.isArray(prod.imagens) ? prod.imagens[0] : (prod.imagem || 'link-da-imagem-padrao.jpg');

            prodDiv.innerHTML = `
                <div class="carousel-container">
                    <img src="${imgPrincipal}" style="width:100%; border-radius:10px;">
                </div>
                <h3>${prod.nome}</h3>
                <p>${prod.preco} Kz</p>
                <button onclick="adicionarCarrinho('${prod.nome}', ${prod.preco}, '${imgPrincipal}')">Comprar</button>
            `;
            container.appendChild(prodDiv);
        });
    } catch (e) {
        console.error("Erro ao carregar produtos:", e);
        container.innerHTML = '<p>Adicione produtos no Painel Admin para eles aparecerem aqui.</p>';
    }
}

// Inicialização
document.addEventListener('DOMContentLoaded', () => {
    window.atualizarMiniCarrinho();
    carregarDestacadosFirebase();
});
</script>
