<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | ABT Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilo rápido para a vitrine da Home */
        .vitrine {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .produto-card {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        .produto-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
        }
        .btn-ver {
            background: #d4af37;
            color: #000;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<header>
    <nav>
        <h1>ABT Marketplace</h1>
        <a href="home.html">Início</a>
        <a href="loja.html">Loja</a>
        <a href="carrinho.html">Carrinho</a>
    </nav>
</header>

<section class="hero">
    <div style="text-align: center; padding: 50px; background: #1c1c1c; color: white;">
        <h2>Bem-vindo à ABT Marketplace</h2>
        <p>Os melhores produtos, agora à distância de um clique.</p>
    </div>
</section>

<main>
    <h2 style="text-align: center; margin-top: 30px;">🔥 Produtos em Destaque</h2>
    
    <div id="destacados-container" class="vitrine">
        <p style="text-align: center; grid-column: 1/-1;">A carregar novidades...</p>
    </div>
</main>

<script type="module" src="script.js"></script>

</body>
</html>
