<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | ABT Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }
        .login-card {
            background: #1c1c1c;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 350px;
            text-align: center;
            color: white;
            border-top: 4px solid #d4af37;
        }
        .login-card h2 { margin-bottom: 20px; color: #d4af37; }
        .login-card input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: none;
            border-radius: 5px;
            box-sizing: border-box;
            background: #333;
            color: white;
        }
        .login-card button {
            width: 100%;
            padding: 12px;
            background: #d4af37;
            border: none;
            color: black;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }
        .login-card button:hover { background: #b88b2f; }
        .msg-erro { color: #ff4d4d; font-size: 0.8rem; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Painel ABT</h2>
    <p>Acesso restrito ao administrador</p>
    
    <div id="erro" class="msg-erro">Usuário ou senha incorretos!</div>
    
    <input type="text" id="usuario" placeholder="Utilizador">
    <input type="password" id="senha" placeholder="Palavra-passe">
    
    <button onclick="entrarNoPainel()">Entrar</button>
</div>

<script>
    function entrarNoPainel() {
        const user = document.getElementById("usuario").value;
        const pass = document.getElementById("senha").value;
        const msgErro = document.getElementById("erro");

        // CREDENCIAIS QUE DEFINIMOS ANTES
        if (user === "admin.00" && pass === "0430") {
            // CRIA A CHAVE DE ACESSO
            localStorage.setItem("adminLogado", "true");
            
            // REDIRECIONA PARA O ADMIN
            window.location.href = "admin.html";
        } else {
            // MOSTRA ERRO SE FALHAR
            msgErro.style.display = "block";
            setTimeout(() => { msgErro.style.display = "none"; }, 3000);
        }
    }

    // Permitir entrar ao carregar na tecla "Enter"
    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') entrarNoPainel();
    });
</script>

</body>
</html>
