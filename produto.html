<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Produto | ABT Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .produto-detalhe-container {
            max-width: 900px;
            margin: 40px auto;
            display: flex;
            gap: 40px;
            padding: 20px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .foto-produto { flex: 1; }
        .foto-produto img { width: 100%; border-radius: 10px; object-fit: cover; }
        .info-produto { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .info-produto h2 { font-size: 2rem; color: #1c1c1c; margin-bottom: 10px; }
        .info-produto .preco-grande { font-size: 1.8rem; color: #d4af37; font-weight: bold; margin-bottom: 20px; }
        .controles { margin-bottom: 20px; }
        .controles input { width: 60px; padding: 8px; border: 1px solid #ccc; border-radius: 5px; margin-left: 10px; }
        .btn-adicionar {
            background: #1c1c1c;
            color: #d4af37;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }
        .btn-adicionar:hover { background: #d4af37; color: #000; }
        
        @media (max-width: 768px) {
            .produto-detalhe-container { flex-direction: column; }
        }
    </style>
</head>
<body>

<header>
    <nav style="background: #1c1c1c; padding: 15px; display: flex; justify-content: space-between;">
        <h1 style="color: #d4af37; margin: 0; font-size: 1.2rem;">ABT Detalhes</h1>
        <a href="loja.html" style="color: white; text-decoration: none;">⬅ Voltar à Loja</a>
    </nav>
</header>

<main class="produto-detalhe-container">
    <div class="foto-produto">
        <img id="img-produto" src="https://via.placeholder.com/400" alt="Produto">
    </div>

    <div class="info-produto">
        <h2 id="nome-produto">Carregando...</h2>
        <p class="preco-grande"><span id="preco-produto">0</span> Kz</p>
        
        <div class="controles">
            <label>Quantidade:</label>
            <input type="number" id="quantidade" value="1" min="1">
        </div>

        <button class="btn-adicionar" onclick="adicionarAoCarrinho()">Adicionar ao Carrinho 🛒</button>
        <p id="msg-sucesso" style="color: green; margin-top: 10px; display: none;">✅ Adicionado com sucesso!</p>
    </div>
</main>

<script>
    // 1. Pegar dados da URL (vêm da loja.html)
    const params = new URLSearchParams(window.location.search);
    const nome = params.get("nome");
    const preco = params.get("preco");
    const img = params.get("img");

    // 2. Preencher a página com os dados
    if (nome && preco && img) {
        document.getElementById("nome-produto").innerText = nome;
        document.getElementById("preco-produto").innerText = preco;
        document.getElementById("img-produto").src = decodeURIComponent(img);
    }

    // 3. Função para salvar no Carrinho (LocalStorage)
    function adicionarAoCarrinho() {
        const qtd = parseInt(document.getElementById("quantidade").value);
        
        // Criar o objeto do item
        const item = {
            nome: nome,
            preco: parseFloat(preco),
            imagem: img,
            quantidade: qtd
        };

        // Pegar o que já tem no carrinho ou criar lista vazia
        let carrinho = JSON.parse(localStorage.getItem("carrinhoABT")) || [];

        // Verificar se o produto já está no carrinho
        const index = carrinho.findIndex(p => p.nome === item.nome);
        if (index > -1) {
            carrinho[index].quantidade += qtd; // Soma a quantidade
        } else {
            carrinho.push(item); // Adiciona novo
        }

        // Salvar de volta
        localStorage.setItem("carrinhoABT", JSON.stringify(carrinho));

        // Mostrar feedback ao usuário
        const msg = document.getElementById("msg-sucesso");
        msg.style.display = "block";
        setTimeout(() => { window.location.href = "carrinho.html"; }, 1500);
    }
</script>

</body>
</html>
