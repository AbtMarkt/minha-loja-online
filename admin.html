<div class="admin-container">
<h2>Pedidos Recebidos</h2>
<div id="pedidos"></div>
</div>

<script>
async function carregarPedidos(){
    const res = await fetch('http://localhost:3000/pedidos');
    const pedidos = await res.json();
    const container = document.getElementById('pedidos');
    container.innerHTML = '';

    pedidos.forEach((p, i)=>{
        container.innerHTML += `
        <div class="prod-admin">
            <div>
                <b>${p.cliente}</b> (${p.email} / ${p.telefone})<br>
                Total: ${p.total} Kz<br>
                Status: <span id="status-${i}">${p.status}</span>
            </div>
            <button onclick="atualizarStatus(${i})">Marcar como Pago</button>
        </div>`;
    });
}

async function atualizarStatus(index){
    const res = await fetch('http://localhost:3000/pedidos');
    let pedidos = await res.json();
    pedidos[index].status = "Pago";
    await fetch('http://localhost:3000/pedidos', {
        method:'PUT',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(pedidos)
    });
    carregarPedidos();
}

carregarPedidos();
</script>
