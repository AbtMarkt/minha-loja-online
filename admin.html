<button onclick="gerarProdutosBeta()" style="background: #4CAF50; color: white; padding: 15px; margin: 20px; border: none; border-radius: 8px; cursor: pointer; width: 100%;">
    🧪 CLIQUE AQUI PARA GERAR 3 PRODUTOS DE TESTE (BETA)
</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDWTvMQNPc27WJpQfKr1zwdvaw1LDMUxH0",
        authDomain: "abt-marketplace.firebaseapp.com",
        projectId: "abt-marketplace",
        storageBucket: "abt-marketplace.firebasestorage.app",
        messagingSenderId: "763460800092",
        appId: "1:763460800092:web:5ac1f341919c1fa02ea099"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.gerarProdutosBeta = async () => {
        const produtosBeta = [
            { nome: "Ténis Urban Black", preco: "15000", categoria: "Masculino", imagem: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500", dataCriacao: new Date() },
            { nome: "Vestido Verão Gold", preco: "12000", categoria: "Feminino", imagem: "https://images.unsplash.com/photo-1515372039744-b8f02a3ae446?w=500", dataCriacao: new Date() },
            { nome: "Relógio ABT Classic", preco: "25000", categoria: "Acessórios", imagem: "https://images.unsplash.com/photo-1524592094714-0f0654e20314?w=500", dataCriacao: new Date() }
        ];

        try {
            for (const p of produtosBeta) {
                await addDoc(collection(db, "produtos"), p);
            }
            alert("✅ 3 Produtos Beta adicionados! Verifica agora a tua Loja.");
        } catch (e) {
            alert("❌ Erro ao enviar para o Firebase: " + e.message);
        }
    };
</script>
